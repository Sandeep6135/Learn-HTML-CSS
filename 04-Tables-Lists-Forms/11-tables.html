<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Element</title>
    <style>
        table,td,th{
            border: 2px solid black;
            border-collapse: collapse;
            width: auto;
            height: auto;
            text-align: center;
        }
        th:hover{
            background-color: grey;
        }
        td:hover{
            background-color: black;
            color: white;
        }

    </style>
</head>
<body>
    <center><caption>Student Data</caption>
    <table>
        <tr>
            <th>Person 1</th>
            <th>Person 2</th>
            <th>Person 3</th>
        </tr>
        <tr>
            <td>Mayank</td>
            <td>Darshak</td>
            <td>Sandeep</td>
        </tr>
        <tr>
            <td>17</td>
            <td>18</td>
            <td>18</td>
        </tr>
    </table>  
    </center>  
</body>
</html>
