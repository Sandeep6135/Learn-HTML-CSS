<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <form>
        <fieldset>
            <legend style="text-align: center;">Student form</legend>
        <label for="1">Name:</label>
        <input type="text" value="Sandeep" disabled><br>
        <label for="2">Mobile:</label>
        <input type="tel" placeholder="+91 9999 99 9999" autofocus><br>
        <label for="3">Email:</label>
        <input type="email" placeholder="abc@gmail.com"><br>
        <label for="4">Password:</label>
        <input type="password" required hidden><br>
        
        <input type="submit">
        <input type="reset">
    </fieldset>
    </form>
</body>
</html>
