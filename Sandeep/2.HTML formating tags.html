<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formating Tags</title>
</head>
<body>
    <!--Formating tags-->
    <b>Bold</b><br>
    <i>Italic</i><br>
    <u>Underline</u><br>
    <em>Emphaized</em><br>
    <strike>999</strike><br>
    <mark>Hello</mark><br>
    <small>Small text</small><br>
    <strong>Very IMP Tag</strong>
    <p>Hello <ins>World</ins></p>
    <p>Hello <del>World</del></p>


    <!--Superscript for Maths-->
    <p>a <sup>2</sup>+b <sup>2</sup>+2ab</p>
    <!--Subscript for Chemical formula-->
    <p>H<sub>2</sub>O</p>
    <hr>
    <marquee>Ohh Yeah!😜</marquee>
    <marquee scrollamount="5" direction="up">Wohoooooo!😎</marquee>
    
</body>
</html>
