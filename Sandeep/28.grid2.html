<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .grid-container{
            background-color: aqua;
            display:grid;
            grid-template-columns: auto auto;
            padding: 10px;
            gap: 10px;
        }
        .grid-item{
            background-color: bisque;
            text-align: center;
        }
    </style>
</head>
<body>
    
    <h2>Simple Grid Example</h2>
    <center>

    <div class="grid-container">
        <div class="grid-item">
            <img src="Photo.jpg" alt="cat" height="150" width="150">
        </div>
        <div class="grid-item"><br><br> Hello!!! Buddy how are you <br> Hope u r not Doing well!</div>
        <div class="grid-item">
            <video src="video.mp4" autoplay loop controls height="150" width="150"></video>
        </div>
        <div class="grid-item">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d14767.4499758535!2d73.35906865000001!3d22.28319805!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x395fda2400192473%3A0xc319c9237f2928e8!2sParul%20University!5e0!3m2!1sen!2sin!4v1760082182271!5m2!1sen!2sin" width="150" height="150" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
        
    </div>
    </center>    
</body>
</html>
