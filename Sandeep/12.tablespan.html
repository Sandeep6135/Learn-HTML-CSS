<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablespan</title>
</head>
<body>
    <table border="2px" width="250" height="250">
        <caption>Table</caption>
        <tr>
            <th colspan="4">1</th>
        </tr>
        <tr>
            <td rowspan="2">2</td>
            <td>3</td>
            <td>4</td>
            <td rowspan="2">5</td>
        </tr>
        <tr>
            <td>6</td>
            <td>7</td>
        </tr>
        <tr>
            <th colspan="4">8</th>
        </tr>  
    </table>
</body>
</html>
